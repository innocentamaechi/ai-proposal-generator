services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: ai-proposal-generator

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - ./app/logs:/app/app/logs
      - ./data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
